<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">

  <!-- ① Orange background -->
  <rect width="512" height="512" fill="#F5821F"/>

  <!-- ② Red left A-frame arm
       Outer edge: top-center (256,86) → bottom-left (62,368)
       Inner edge: (256,140) → (130,368)                      -->
  <polygon points="256,86 62,368 130,368 256,140" fill="#C0182A"/>

  <!-- ③ Red right A-frame arm (mirror) -->
  <polygon points="256,86 450,368 382,368 256,140" fill="#C0182A"/>

  <!-- ④ Red base bar (connects both arms at bottom) -->
  <rect x="62" y="356" width="388" height="52" rx="5" fill="#C0182A"/>

  <!-- ⑤ Green roof cap — triangle sitting on the peak -->
  <polygon points="256,46 198,140 314,140" fill="#2D8C2D"/>

  <!-- ⑥ Inner arch gateway
       Outer shape: full U-frame from (170,358) up + over arch
       Inner cutout (orange): removes center, leaving only frame   -->
  <!-- Outer arch U-frame (red) -->
  <path d="
    M 170,358
    L 170,272
    A 86,86 0 0 1 342,272
    L 342,358
    Z
  " fill="#C0182A"/>
  <!-- Inner cutout — reveals orange bg inside arch + doorway -->
  <path d="
    M 208,358
    L 208,275
    A 48,48 0 0 1 304,275
    L 304,358
    Z
  " fill="#F5821F"/>

</svg>
